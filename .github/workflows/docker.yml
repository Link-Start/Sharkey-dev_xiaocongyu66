#
# Build the root Dockerfile and push to GitHub Container Registry (GHCR).
#
# Images:
#   ghcr.io/<owner>/<repo>:<tag>
#
# Default tags (example repo xiaocongyu66/Sharkey-dev):
#   - latest          (default branch only)
#   - <package.json version>  e.g. 2025.5.2-dev
#   - sha-<short>     e.g. sha-7bd5e01
#   - branch name     e.g. main
#   - git tag         when building a release tag
#
# Requirements:
#   - Packages: Read and write (Settings → Actions → General → Workflow permissions)
#   - First image may need: Settings → Packages → package visibility / link to repo

name: Docker

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
      - '20*'
  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'packages/**'
      - 'locales/**'
      - 'sharkey-locales/**'
      - 'scripts/**'
      - '.github/workflows/docker.yml'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target platforms (comma-separated)'
        required: false
        default: 'linux/amd64'
        type: choice
        options:
          - linux/amd64
          - linux/amd64,linux/arm64
      push:
        description: 'Push image to GHCR (false = build only)'
        required: false
        default: true
        type: boolean

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # GHCR requires lowercase image names
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build${{ github.event_name == 'pull_request' && ' (no push)' || ' & push' }}
    runs-on: ubuntu-latest
    # Sharkey full image build is heavy
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write
      # needed for PR builds that only authenticate to pull base layers anonymously
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Free disk space
        # Full monorepo build + node_modules can exhaust the default runner disk
        run: |
          set -eux
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Set up QEMU
        if: contains(github.event.inputs.platforms || 'linux/amd64', 'arm64')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || github.event.inputs.push != 'false')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract package version
        id: pkg
        run: |
          set -eux
          VERSION=$(node -p "require('./package.json').version")
          # sanitize for docker tag (semver-ish already ok)
          VERSION_TAG=$(echo "$VERSION" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=${{ steps.pkg.outputs.version_tag }},enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
          labels: |
            org.opencontainers.image.title=Sharkey
            org.opencontainers.image.description=Sharkey (Misskey-based) Fediverse server
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.pkg.outputs.version }}

      - name: Resolve platforms
        id: platforms
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.platforms }}" ]; then
            echo "value=${{ github.event.inputs.platforms }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=linux/amd64" >> "$GITHUB_OUTPUT"
          fi

      - name: Should push?
        id: push
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.push }}" = "false" ]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
          else
            echo "value=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ steps.platforms.outputs.value }}
          push: ${{ steps.push.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache speeds up rebuilds of node_modules / layers
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Image summary
        if: steps.push.outputs.value == 'true'
        run: |
          echo "### Docker image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull example:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
